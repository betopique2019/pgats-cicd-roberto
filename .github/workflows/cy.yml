name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 20

    - run: yarn install

    - run: yarn test --coverage

    - uses: actions/upload-artifact@v4
      with:
        name: cobertura
        path: pgats-cicd/coverage/
